<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Puerto Williams</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #121212; color: #eee; text-align: center; }
        header { padding: 40px 20px; background: #1f1f1f; }
        h1 { color: #00d4ff; margin-bottom: 5px; }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 15px; 
            padding: 20px; 
        }
        .gallery img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s;
            background: #222; /* Fondo gris mientras cargan */
        }
        .gallery img:hover { transform: scale(1.03); box-shadow: 0 0 15px rgba(0,212,255,0.4); }
        
        /* Lightbox para ver en grande */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
        }
        #lightbox img { max-width: 95%; max-height: 95%; border: 2px solid #00d4ff; }
    </style>
</head>
<body>

<header>
    <h1>Puerto Williams</h1>
    <p>Catálogo de 51 fotografías</p>
</header>

<div class="gallery" id="contenedor-fotos">
    </div>

<div id="lightbox" onclick="this.style.display='none'">
    <img id="foto-grande" src="" alt="">
</div>

<script>
    // Lista exacta de tus 51 archivos
    const fotos = [
        "20260219_105901.jpg", "20260218_154920.jpg", "20260219_155618.jpg", "20260218_160838.jpg",
        "20260218_155703.jpg", "20260218_151739.jpg", "20260219_155940.jpg", "20260218_154142.jpg",
        "20260218_163443.jpg", "20260218_155212.jpg", "20260218_160151.jpg", "20260218_154230.jpg",
        "20260218_151445.jpg", "20260218_151616.jpg", "20260218_151359.jpg", "20260218_162510.jpg",
        "20260218_155604.jpg", "20260218_152050.jpg", "20260219_162003.jpg", "20260219_105237.jpg",
        "20260219_155734.jpg", "20260218_163357.jpg", "20260218_163924.jpg", "20260218_151259.jpg",
        "20260218_152401.jpg", "20260218_154332.jpg", "20260218_150429.jpg", "20260218_151534.jpg",
        "20260218_154300.jpg", "20260218_162323.jpg", "20260218_163313.jpg", "20260219_161934.jpg",
        "20260218_162950.jpg", "20260219_161211.jpg", "20260218_163741.jpg", "20260219_110809.jpg",
        "20260219_155502.jpg", "20260218_150646.jpg", "20260219_155803.jpg", "20260218_163549.jpg",
        "20260219_105405.jpg", "20260219_105332.jpg", "20260219_161903.jpg", "20260218_155333.jpg",
        "20260219_105531.jpg", "20260218_150613.jpg", "20260219_111027.jpg", "20260218_154510.jpg",
        "20260218_163705.jpg", "20260218_155833.jpg", "20260218_151933.jpg"
    ];

    const contenedor = document.getElementById('contenedor-fotos');
    const lightbox = document.getElementById('lightbox');
    const fotoGrande = document.getElementById('foto-grande');
    
    // RUTA ABSOLUTA para evitar errores de carga
    const baseRuta = "https://cmasudd-aigame.github.io/ptowilliams/foto_casas_ptoWilliams/";

    fotos.forEach(nombre => {
        const img = document.createElement('img');
        img.src = baseRuta + nombre;
        img.alt = "Foto Williams";
        
        img.onclick = () => {
            fotoGrande.src = img.src;
            lightbox.style.display = 'flex';
        };
        
        contenedor.appendChild(img);
    });
</script>

</body>
</html>
