<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Casas - Puerto Williams</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        
        /* Estilo del Popup */
        .leaflet-popup-content-wrapper {
            border-radius: 4px;
            padding: 0;
            overflow: hidden;
        }
        .leaflet-popup-content {
            margin: 0;
            width: 280px !important;
        }
        .popup-box {
            text-align: center;
        }
        .popup-box img {
            width: 100%;
            display: block;
            height: auto;
            border-bottom: 1px solid #ccc;
        }
        .popup-box .info {
            padding: 8px;
            font-family: Arial, sans-serif;
            font-size: 13px;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="puntos.js"></script>

    <script>
        // 1. Inicializar mapa en Puerto Williams
        const map = L.map('map').setView([-54.9339, -67.6110], 16);

        // 2. Capa base (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. Ruta base de las imágenes
        const baseRuta = "https://cmasudd-aigame.github.io/ptowilliams/foto_casas_ptoWilliams/";

        // 4. Cargar los puntos desde la variable 'puntos' definida en puntos.js
        L.geoJSON(puntos, {
            onEachFeature: function (feature, layer) {
                if (feature.properties && feature.properties.archivo) {
                    const imagenUrl = baseRuta + feature.properties.archivo;
                    
                    // Crear estructura del popup con la imagen
                    const contenido = `
                        <div class="popup-box">
                            <img src="${imagenUrl}" alt="Casa">
                            <div class="info">
                                <strong>Archivo:</strong> ${feature.properties.archivo}
                            </div>
                        </div>
                    `;
                    
                    layer.bindPopup(contenido);
                }
            }
        }).addTo(map);
    </script>
</body>
</html>
