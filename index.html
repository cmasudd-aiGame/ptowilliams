<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Observatorio Casas - Puerto Williams</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        #map { height: 100vh; width: 100%; background: #f0f0f0; }
        .popup-content { text-align: center; }
        .popup-img { width: 100%; max-width: 250px; border-radius: 4px; margin-top: 8px; }
        h2 { margin: 5px 0; font-size: 16px; color: #333; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="puntos.js"></script> <script>
        // Coordenadas iniciales centradas en Puerto Williams
        var map = L.map('map').setView([-54.9338, -67.6130], 14);

        // Capa de mapa (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Agregar los puntos automáticamente
        puntosCasas.forEach(function(punto) {
            var marker = L.marker([punto.lat, punto.lng]).addTo(map);
            
            // Contenido de la burbuja (asumimos que las fotos estarán en una carpeta llamada 'fotos')
            var html = `
                <div class="popup-content">
                    <h2>Casa: ${punto.archivo}</h2>
                    <img src="fotos/${punto.archivo}" class="popup-img">
                </div>
            `;
            marker.bindPopup(html);
        });
    </script>
</body>
</html>
